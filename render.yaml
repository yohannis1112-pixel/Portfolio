services:
  - type: web
    name: portfolio
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://your-app.onrender.com
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: your-secure-password
      - key: CLOUDINARY_CLOUD_NAME
        value: dqsnrjyfk
      - key: CLOUDINARY_API_KEY
        value: 285158231158376
      - key: CLOUDINARY_API_SECRET
        value: EIeiHsdnE72cyk91LBKyhyo9778

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free